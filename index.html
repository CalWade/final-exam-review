<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>期末复习 · 学科导航</title>
<style>
  :root {
    --bg: #FAFAF7;
    --card: #FFFFFF;
    --border: #E0E0E0;
    --text: #222;
    --muted: #666;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    font-family: -apple-system, "PingFang SC", "Microsoft YaHei", "Helvetica Neue", sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
    min-height: 100vh;
    padding: 40px 20px;
  }
  .container {
    max-width: 1100px;
    margin: 0 auto;
  }
  header {
    text-align: center;
    margin-bottom: 48px;
  }
  header h1 {
    font-size: 32px;
    font-weight: 600;
    letter-spacing: 2px;
    background: linear-gradient(135deg, #1F497D 0%, #2E75B6 100%);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 10px;
  }
  header p {
    color: var(--muted);
    font-size: 15px;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 20px;
  }
  .card {
    display: block;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 28px 24px;
    text-decoration: none;
    color: inherit;
    transition: all .25s ease;
    position: relative;
    overflow: hidden;
    border-left: 5px solid var(--accent, #1F497D);
  }
  .card:hover {
    transform: translateY(-4px);
    box-shadow: 0 12px 28px rgba(0,0,0,.08);
    border-color: var(--accent, #1F497D);
  }
  .card .tag {
    display: inline-block;
    font-size: 12px;
    color: var(--accent);
    background: var(--accent-bg, rgba(31,73,125,.08));
    padding: 3px 10px;
    border-radius: 12px;
    margin-bottom: 14px;
    font-weight: 500;
  }
  .card h2 {
    font-size: 19px;
    font-weight: 600;
    margin-bottom: 8px;
    color: var(--text);
  }
  .card p {
    font-size: 14px;
    color: var(--muted);
    line-height: 1.6;
  }
  .card .arrow {
    position: absolute;
    right: 22px;
    bottom: 18px;
    color: var(--accent);
    font-size: 18px;
    opacity: .5;
    transition: all .25s ease;
  }
  .card:hover .arrow {
    opacity: 1;
    transform: translateX(4px);
  }
  footer {
    text-align: center;
    margin-top: 60px;
    color: var(--muted);
    font-size: 13px;
  }
  @media (max-width: 600px) {
    header h1 { font-size: 26px; }
    .card { padding: 22px 20px; }
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>期末复习 · 学科导航</h1>
    <p>选择科目进入复习页面</p>
  </header>

  <div class="grid">

    <a class="card" style="--accent:#C00000; --accent-bg:rgba(192,0,0,.08);" href="xixiang.html">
      <span class="tag">政治</span>
      <h2>习近平思想</h2>
      <p>26.6 记忆锚点版（逐点解析）</p>
      <span class="arrow">→</span>
    </a>

    <a class="card" style="--accent:#1F497D; --accent-bg:rgba(31,73,125,.08);" href="network.html">
      <span class="tag">计网</span>
      <h2>计算机网络</h2>
      <p>从零开始的学习指南</p>
      <span class="arrow">→</span>
    </a>

    <a class="card" style="--accent:#007000; --accent-bg:rgba(0,112,0,.08);" href="dip.html">
      <span class="tag">数图</span>
      <h2>数字图像处理</h2>
      <p>从零开始学习指南</p>
      <span class="arrow">→</span>
    </a>

    <a class="card" style="--accent:#7030A0; --accent-bg:rgba(112,48,160,.08);" href="compiler.html">
      <span class="tag">编译</span>
      <h2>编译原理</h2>
      <p>从零到期末 · 深度学习文档</p>
      <span class="arrow">→</span>
    </a>

  </div>

  <footer>
    点击卡片进入对应科目的复习页面 · 在页面内可通过浏览器返回此导航页
  </footer>
</div>
</body>
</html>
